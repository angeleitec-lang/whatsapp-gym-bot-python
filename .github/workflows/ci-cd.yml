name: CI/CD Pipeline - Python

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock flake8 black isort

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code format with Black
        run: black --check .
        continue-on-error: true

      - name: Check import sort with isort
        run: isort --check-only .
        continue-on-error: true

      - name: Run unit tests
        run: pytest test_qa.py test_config.py test_whatsapp_service.py -v --cov=. --cov-report=xml --cov-report=html

      - name: Run integration tests
        run: pytest test_app.py -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate coverage badge
        if: matrix.python-version == '3.10'
        run: |
          pip install coverage
          coverage report
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build wheel

      - name: Verify imports
        run: |
          python -c "import app; import config; import qa_database; import chatbot_orchestrator; print('All imports successful')"

      - name: Check for syntax errors
        run: python -m py_compile app.py config.py qa_database.py chatbot_orchestrator.py whatsapp_service.py chatgpt_service.py database_service.py google_sheets_service.py logger.py

      - name: Build distribution
        run: |
          mkdir -p dist
          cp -r . dist/whatsapp-gym-bot-python/
          ls -la dist/

      - name: Verify application startup
        timeout-minutes: 2
        run: |
          timeout 5 python app.py &
          sleep 2
          curl http://localhost:3000/health || echo "Server not fully started (expected in test environment)"
        continue-on-error: true

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r . -f json -o bandit-report.json
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: safety check --json
        continue-on-error: true

      - name: Verify .env is not committed
        run: |
          if git ls-tree -r HEAD | grep -q '\.env$'; then
            echo "ERROR: .env file is committed!"
            exit 1
          else
            echo "✓ .env file is not committed"
          fi

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins
        continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint radon

      - name: Analyze code complexity
        run: radon cc . -a -nb
        continue-on-error: true

      - name: Analyze maintainability index
        run: radon mi . -nb
        continue-on-error: true

  notify:
    needs: [test, build, security, code-quality]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All tests passed and build successful!"
            exit 0
          else
            echo "⚠️ Some checks failed or were skipped"
            exit 0
          fi

      - name: Post test summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
